name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install CLI deps
        run: sudo apt-get update && sudo apt-get install -y sqlite3 jq

      - name: Bootstrap a synthetic index (no private data)
        run: |
          mkdir -p "$HOME/.claude/bin" "$HOME/.claude/hooks"
          cp bin/session-search.py bin/claude-search "$HOME/.claude/bin/"
          cp -R hooks/. "$HOME/.claude/hooks/"
          python3 assets/demo/build_demo_db.py "$HOME/.claude/session-index.db"

      - name: Smoke test
        run: bash tests/smoke-test.sh
